services:
  - type: web
    name: hotel-delacruxe
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SECRET
        generateValue: true
    disk:
      name: hotel-data
      mountPath: /var/data
      sizeGB: 1
